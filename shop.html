  <style>
    /* ===== BODY ===== */
    body {
      background: #020617;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* ===== CONTAINER ===== */
    .container {
      padding: 30px;
    }

    .title {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
    }

    /* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      /* Desktop */
      gap: 20px;
    }

    /* ===== CARD ===== */
    .card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: 0.4s;
    }

    /* ZOOM EFFECT */
    .card:hover img {
      transform: scale(1.1);
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 20px;
      color: #fff;
      opacity: 0;
      transition: 0.4s;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    .overlay h4 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    /* ===== BUTTON ===== */
    .btn {
      background: linear-gradient(135deg, #00f5c4, #3b82f6);
      color: #000;
      padding: 6px 14px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* ===== RESPONSIVE ===== */

    /* Tablet */
    @media (max-width: 992px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Mobile (2 cards per row) */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card img {
        height: 150px;
      }
    }

    /* Small Mobile */
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        /* still 2 */
      }

      .card img {
        height: 130px;
      }

      .overlay h4 {
        font-size: 14px;
      }
    }

    /* ===== BACK BUTTON ===== */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
      transition: 0.3s;
    }

    .back-btn:hover {
      transform: translateY(-3px) scale(1.05);
      color: #fff;
      box-shadow: 0 8px 20px rgba(255, 75, 43, 0.7);
    }

    .back-btn i {
      font-size: 18px;
    }
  </style>
</head>

        });
