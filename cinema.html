
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>SR INDIAN - Movie Shows </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    /* ===== BODY ===== */
    body {
      background: #020617;
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* ===== CONTAINER ===== */
    .container {
      padding: 30px;
    }

    .title {
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
    }

    /* ===== GRID ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      /* Desktop */
      gap: 20px;
    }

    /* ===== CARD ===== */
    .card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      transition: 0.4s;
    }

    /* ZOOM EFFECT */
    .card:hover img {
      transform: scale(1.1);
    }

    /* ===== OVERLAY ===== */
    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 20px;
      color: #fff;
      opacity: 0;
      transition: 0.4s;
    }

    .card:hover .overlay {
      opacity: 1;
    }

    .overlay h4 {
      margin-bottom: 8px;
      font-size: 16px;
    }

    /* ===== BUTTON ===== */
    .btn {
      background: linear-gradient(135deg, #00f5c4, #3b82f6);
      color: #000;
      padding: 6px 14px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    /* ===== RESPONSIVE ===== */

    /* Tablet */
    @media (max-width: 992px) {
      .grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Mobile (2 cards per row) */
    @media (max-width: 768px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card img {
        height: 150px;
      }
    }

    /* Small Mobile */
    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        /* still 2 */
      }

      .card img {
        height: 130px;
      }

      .overlay h4 {
        font-size: 14px;
      }
    }

    /* ===== BACK BUTTON ===== */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
      transition: 0.3s;
    }

    .back-btn:hover {
      transform: translateY(-3px) scale(1.05);
      color: #fff;
      box-shadow: 0 8px 20px rgba(255, 75, 43, 0.7);
    }

    .back-btn i {
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2 class="title">Movie Shows <br><br>

      <div class="date-time-box">
        <span id="live-date"></span>
        <span id="live-time"></span>
      </div>
    </h2>

    <style>
      #live-date,
      #live-time {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-weight: 600;
      }

      #live-date i {
        color: #38bdf8;
      }

      #live-time i {
        color: #22c55e;
      }
    </style>

    <script>
      function updateDateTime() {

        const now = new Date();

        const date = now.toLocaleDateString('en-IN', {
          weekday: 'long',
          day: 'numeric',
          month: 'long',
          year: 'numeric'
        });

        const time = now.toLocaleTimeString('en-IN', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });

        document.getElementById('live-date').innerHTML =
          '<i class="bi bi-calendar-event"></i> ' + date;

        document.getElementById('live-time').innerHTML =
          '<i class="bi bi-clock-history"></i> ' + time;
      }

      updateDateTime();
      setInterval(updateDateTime, 1000);
    </script>

    <!-- BACK BUTTON -->
    <div style="margin-bottom: 20px;">
      <a href="services.html" class="back-btn"><i class="bi bi-arrow-left-circle"></i> Back</a>
    </div>

    <div class="grid">

      <!-- District cinema  -->
      <div class="card">
        <img src="assets/images/cinema/cc1.jpg" />
        <div class="overlay">
          <h4> District cinema </h4>
          <a href="https://www.district.in/movies/nagercoil-movie-tickets?utm_source=paytm_redirection" class="btn">Book Now</a>
        </div>
      </div>

      <!-- bookmyshow -->
      <div class="card">
        <img src="assets/images/cinema/cc2.jpg" />
        <div class="overlay">
          <h4>bookmyshow</h4>
          <a href="https://in.bookmyshow.com/explore/home/nagercoil" class="btn">Book Now</a>
        </div>
      </div>

      <!-- kanyakumarians  -->
      <div class="card">
        <img src="assets/images/cinema/cc3.jpg" />
        <div class="overlay">
          <h4>kanyakumarians </h4>
          <a href="https://www.kanyakumarians.com/nagercoil-movies" class="btn">Book Now</a>
        </div>
      </div>

      <!-- PVP Multiplex 4K RGB Laser Dolby Atmos -->
      <div class="card">
        <img src="assets/images/cinema/cc4.jpg" />
        <div class="overlay">
          <h4>PVP Multiplex 4K RGB Laser Dolby Atmos</h4>
          <a href="https://ticketnew.com/movies/kalakad/pvp-multiplex-4k-rgb-laser-dolby-atmos-nagercoil-c/1041753" class="btn">Book Now</a>
        </div>
      </div>

    </div>
  </div>
</body>

</html>
